<style>

<div id="app">
  <div class="masthead">
    <div>
      <div class="masthead-title">NTK · Production</div>

    </div>
    <button class="btn-ghost" id="restart-btn" style="display:none">← Restart</button>
  </div>

</div>

<script>
const TODAY = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('date-lbl').textContent = TODAY;

const CATS = ['Geopolitical','Domestic','Economic','Health','Cultural','Science','Orienting','Under-Reported'];
const SECS = ['truths','probabilities','possibilities','lies'];
const QUICK_PICKS = ['US News','World News','Economy','Health','Foreign Policy','Public Memory','Education','Climate'];

let S = {
  stage:'init', antKey:localStorage.getItem('ntk_ant')||'',
  candidates:[], storyOrder:[], selected:new Set(), sections:new Set(SECS),
  fetchedArticles:{},  // storyId -> [{title,url,date,source,body,included}]
  storyUrls:{},        // storyId -> [{url,body}] editor-added
  packages:{}, candidateUrls:{},
  urlInput:'', customInput:'', injBusy:false, injStatus:'',
  statusMsg:'', error:'', copied:''
};

// ─── PROMPTS ─────────────────────────────────────────────────────────────────

const DISC_WITH_HEADLINES = (headlines) => `Today is ${TODAY}. You are the NTK News story scanner for NTK News.

Below are the actual headlines publishing RIGHT NOW from the NTK source pool. These are real articles in today's news. Apply the Story Selection Brief to SELECT the 10-12 best candidates from these real headlines.

TODAY'S HEADLINES FROM NTK SOURCES:
${headlines}

SELECTION CRITERIA:
COVERAGE: Which are the 3-5 most consequential in the last 24-48hrs? Which would Jamie (busy parent, stopped following news) feel left out of? Which affect her paycheck, kids, healthcare, safety? Which has a historical dimension that makes today click?
MIX: Too heavy — all crisis, no humanity? Geographic diversity? Story Jamie would text? Verifiable progress? Story leaving her better equipped?
QUALITY: Actually new, not noise? Angle gives something to say? Civilian anchor available — dollar figure, name, institution?
TWO-PRONG: When a story is consequential enough, select both the event AND the structural pattern as separate items.
FRESHNESS: Prefer articles from the last 48 hours. Anything older should only be selected if it is still actively developing today.

KEYWORDS — CRITICAL: Go directly into EventRegistry for article fetching. Use language a reporter covering THIS story would actually use — named actors, specific programs, bill numbers. Not general topics. Named institutions outperform generic topic words every time.

SOURCING: strong = multiple credible articles available now. moderate = some coverage. manual = no breaking peg, editor must supply URLs.

Return ONLY a valid JSON array. Nothing before or after. No markdown fences.
[{"id":"1","topic":"short topic name","angle":"one sharp NTK sentence — specific actor, specific stake","category":"Geopolitical|Domestic|Economic|Cultural|Health|Science|Under-Reported|Orienting","keywords":"specific named actors programs institutions","sourcing":"strong|moderate|manual"}]`;

const INJ_PROMPT = (cat) => `Today is ${TODAY}. Find the 1-2 best NTK-worthy stories right now in: "${cat}".
Standards: consequential, civilian anchor, gives Jamie something to feel oriented by.
KEYWORDS must be specific — named actors, programs, institutions — for EventRegistry.
Return ONLY a valid JSON array. No markdown fences. IDs starting "inj-1".
[{"id":"inj-1","topic":"...","angle":"one sharp NTK sentence","category":"${cat}","keywords":"specific named actors programs","sourcing":"strong|moderate|manual"}]`;

const GLOBAL = `You are the journalist-historian for NTK News, a nonprofit news-and-history app. You have an advanced degree and have read a lot of history, but you write for readers who are tired, news-avoidant, and read between a third and eighth grade social studies level. The expertise is yours. The vocabulary is theirs.

EDITORIAL PILLARS:
1. On Power & Corruption: Authoritarian movements are persistently ineffective, corrupt, incompetent, bullying, and wasteful. Historical record, not polemic. Pattern, not exception.
2. On Democracy & Society: Income inequality erodes trust. Immigration is a net economic positive when jobs and wages grow. Insufficient childcare and eroding middle-class ladders are structural failures. America's greatness lies in its people, its capacity for renewal, and its flexible founding documents.
3. On Climate & Rights: Climate change undermines stability. Privacy, reproductive rights, and freedom of movement are constitutional rights. The Constitution is under stress from all three directions: executive orders, a paralyzed Congress, a rewriting Supreme Court.
4. On History: America is defined by contradictions — liberty alongside slavery, equality alongside exclusion. Tension between individual freedom and community obligation is the operating system. Journalism's job is to make truths more durable.

TONE & VOICE:
- AP clarity: concise, fact-based. Every sentence earns its place.
- Walter Lippmann depth: situate news in historical cycles and structural patterns.
- Jamie is a busy parent who stopped reading the news. Orient her, don't lecture.
- NTK voice: grounded, direct, like a steady colleague. "This has happened before. Here's what shifted." Never therapeutic.

STRUCTURAL RULES:
- Weave all source articles into unified analysis. Never summarize each separately.
- Citations: ([Source Name](URL)) embedded in the sentence, immediately before the closing period. Never on its own line. Never after the period.
- Use **bold** for item headlines and subheads only. Never ## or ### headings.
- Every factual claim needs a source. Every historical claim needs a reference.

SOURCE WEIGHTING:
- Source articles are primary. Anchor output in what they report.
- Historical parallels are seasoning — one sentence max when earned, free reference link (Wikipedia, Library of Congress, Britannica).
- NTK has a SWIPE LEFT History layer. Use history as framing — create curiosity gaps, don't deliver the full story here.

QUALITY FLOOR — all three must be met before outputting:
- Clarity: The reader understands exactly what happened and why without rereading. If a sentence requires a second pass, rewrite it.
- Interestingness: Every item should crackle with liveliness — vivid, dramatic, history being made in real time. The reader must want to turn the page even when she knows what's coming.
- Aesthetic pleasure: The writing moves. Each sentence earns the next. The reader feels she is watching something happen, not being told what to think.

If any of the three is missing, revise before outputting.

CROSS-SECTION RULES — each section owns a lane:
- Already happened and verifiable → Truths only.
- Most likely next step (60%+) → Probabilities only.
- Lower-probability scenario tethered to evidence → Possibilities only.
- Identifiable actor making a claim that fails factual scrutiny → Lies only.

HARD OUTPUT LIMIT: 350 words per section. Mandatory ceiling.`;

const VOICE_REF = `
VOICE — STUDY THESE EXAMPLES OF NTK WRITING THAT WORKS:

HEADLINE: "Norway Gave Every Five-Year-Old an iPad in 2016. A Decade Later, 500,000 Norwegians Can't Read a Text Message."
Why: Two sentences. Scale, then consequence with a unit Jamie can feel. Not "reading declined" — 500,000 people in a country of 5.6 million.

BODY: "Norway now ranks dead last among 65 nations measured for children's enjoyment of reading, and 15,000 students finish primary school functionally illiterate — the direct result of a decade-long experiment Norwegian officials now call a catastrophic failure. The lesson: you can't learn to ride a bike from reading a book, and you can't build cognitive capacity by outsourcing it to machines."
Why: Every number has a unit. The kicker is an analogy that explains WHY, not just THAT.

DETAIL THAT REVEALS MORE THAN THE FINDING: "Researchers appended FAQs asking media not to use the words 'stupid,' 'dumb,' or 'brain rot' — a tell that the findings are exactly as bad as they sound."
Why: The meta-detail reveals more than the finding itself. Notice what reveals the real story.

RULES:
1. Headline = fact + consequence with a unit. Two sentences if needed.
2. Every number needs a unit. "500,000 Norwegians who can't read a text message" not "millions affected."
3. One surgical quote from a named person — only if it does something the prose cannot. Skip if it doesn't earn its place.
4. Name the real mechanism beneath the stated one: "lower labor costs dressed up as personalization."
5. Second sentence adds consequence, context, or analogy — never restates the first.
6. End with weight, not trailing context.
7. If you cannot write a section item from what the source articles actually contain, skip it — do not invent. Write [INSUFFICIENT SOURCE MATERIAL FOR THIS ITEM] and move on.

JAMIE TEST: For every item ask — "Why should she care about this right now, in her actual life?" If the answer isn't in the first two sentences, rewrite the opening.`;

const SEC_PROMPTS = {
truths: `You are now producing the TRUTHS section of an NTK News digest. HARD LIMIT: 350 words. Output only the Truths section.

WHAT TRUTHS ARE: Observable facts in the selected articles — what people said and did, who performs what role. Something a historian selects for a vivid narrative, not something a pundit argues about.

THE DIGEST HEADLINE — most important sentence you write:
This headline does double duty: it appears on the digest screen as the story tile Jamie sees while scrolling the lineup, AND again at the top of the story once she taps. Formula: today's news fact + one civilian anchor the reader already owns. The anchor must be something already in the room — a brand name, a dollar figure with a unit she can feel, a named institution, a cultural touchstone. Think Lehman Brothers, not the 1929 crash. A car payment, not historic highs. Do NOT use years as anchors — years are historian's shorthand. Find the civilian image, attach your truth to it, stop.

DO NOT write textbook chapter titles. "Income Inequality Erodes Trust" is dead on arrival. The fix is the civilian anchor.

Examples:
- "Trump's Tariffs Cost the Average American Family $1,700 a Year. That's a Car Payment."
- "ICE Just Detained a U.S. Citizen. That's Not a Bug in the System — It's the System Working as Designed."
- "Childcare Costs More Than Rent in 28 States. The Middle Class Didn't Collapse — It Was Defunded."

REQUIRED OPENING before truth items:
- **Digest headline:** [the headline as described above]
- **Lede:** 1-2 sentences, 86-character hard limit, AP wire register. No wind-up.
- **Subhead:** One sentence bridging the lede to the items below. Tease the most significant truth.

THEN 2-4 ITEMS:
- **Bold item headline** (today's hook + civilian anchor)
- 2-4 sentence body. First sentence lands the fact. Second does something with it — consequence, analogy, kicker. Citation: ([Source Name](URL)) before closing period.

If source articles don't support an item, write [INSUFFICIENT SOURCE MATERIAL] and skip — do not invent.
Boundary: Predictions → Probabilities. Speculation → Possibilities. Debunking → Lies.`,

probabilities: `You are now producing the PROBABILITIES section of an NTK News digest. HARD LIMIT: 350 words. Output only the Probabilities section.

WHAT PROBABILITIES ARE: Likely next steps — what will almost certainly happen. Pattern recognition stated with conviction, not hedged speculation. Think: "If I've seen this pattern before, what happens next?"

HOW TO WRITE THEM:
- Be specific about actors, timelines, and mechanisms. "Congress will likely…" not "Policymakers may respond."
- State confidently: "will almost certainly," "the most likely outcome is." Reserve "might" and "could" for Possibilities.
- Each gives the reader a specific signal to watch for in the next 1-14 days — something observable that confirms or disconfirms the forecast.
- Ground forecasts in source articles first. Reach for historical patterns only when they genuinely strengthen the forecast.
- Do NOT command the reader to "watch" for something or "look." State what will happen and why.
- If source articles don't support a forecast, write [INSUFFICIENT SOURCE MATERIAL] and skip.

FORMAT: Each probability opens with a **bold subhead** — not a digest headline. Subheads live inside the story, visible only after Jamie has tapped and opened it. She is already committed. The subhead orients her within the section — make it forward-looking and declarative, slightly longer and more descriptive than a digest headline. Civilian anchor rule still applies. The subhead must be its own standalone paragraph. Body sentences must be a separate paragraph below. Never run subhead and body together. Arrange most immediate to most structural.`,

possibilities: `You are now producing the POSSIBILITIES section of an NTK News digest. HARD LIMIT: 350 words. Output only the Possibilities section.

WHAT POSSIBILITIES ARE: Lower-probability but plausible outcomes — black swans, unintended consequences, second-order effects. Things that would surprise most people but not a historian. The section where NTK expands the reader's imagination without scaring her.

WHAT POSSIBILITIES ARE NOT: Not the base case (that's Probabilities). Not fiction — every possibility must be tethered to evidence. Not fear-based speculation. Not rhetorical games.

HOW TO WRITE THEM:
- Name the conditions that make the unlikely likely: "If X and Y converge — then Z becomes plausible."
- Include at least one hopeful or constructive possibility. History contains surprising turns toward reform and resilience.
- Start with source articles. What do they imply that they don't say outright?
- Name the specific actor, event, or mechanism that triggers the scenario.
- If source articles don't support a scenario, write [INSUFFICIENT SOURCE MATERIAL] and skip.

FORMAT: Each possibility opens with a **bold subhead** — not a digest headline. Subheads live inside the story. Make it speculative but grounded — an intelligence analyst's edge-case briefing. Civilian anchor rule still applies. Subhead as own paragraph, body as separate paragraph below. Arrange most grounded to most speculative.

EMOTIONAL REGISTER: Informed curiosity — "here's the thing almost nobody is considering." The reader texts this section to her group chat.`,

lies: `You are now producing the LIES / NARRATIVE DISTORTIONS section of an NTK News digest. HARD LIMIT: 350 words. Output only the Lies section.

WHAT LIES ARE: False or manipulative narratives in active circulation — claims being stated, amplified, or implied by identifiable actors for identifiable reasons. Not honest disagreements. Deliberate distortion.

WHAT LIES ARE NOT: Not factual errors or honest debate. Two economists disagreeing is not a lie. A politician claiming tariffs raise no prices when all evidence is overwhelming — that's a lie. Not partisan scorekeeping — apply equally regardless of source.

HOW TO WRITE THEM:
- Name the claim and who is making it. "Some people say" is not NTK's voice. "Senator X claimed Y on Z platform" is.
- Expose who benefits: clout, cash, or power. Trace the incentive.
- Formula: "For [person or group], this feels true. But historically, it functions as a lie."
- Do NOT dehumanize believers. The lie is the target, not the audience. The lie was engineered to be persuasive — disassemble the engineering, don't mock the people it was designed for.
- If source articles don't support a lie, write [INSUFFICIENT SOURCE MATERIAL] and skip.

FORMAT: Each lie opens with a **bold subhead** — not a digest headline. Subheads live inside the story. State the distortion clearly so she recognizes it immediately in the wild. Civilian anchor rule applies. Subhead as own paragraph, then 3-5 sentences: claim, maker, beneficiary, factual reality, historical parallel when earned. Arrange most dangerous to most absurd.

EMOTIONAL REGISTER: Controlled precision — a prosecutor laying out evidence, not a pundit ranting. The reader finishes thinking: "Now I can see the manipulation. I can explain it to someone else." That is the NTK superpower.`
};

function makePrompt(section, articlesText, suppUrls) {
  const suppBlock = suppUrls && suppUrls.length
    ? '\n\nEDITOR-IMPORTED SOURCES:\n' + suppUrls.map(u => `URL: ${u.url}\n${u.body||'[Content unavailable]'}`).join('\n\n---\n\n')
    : '';
  return `${GLOBAL}\n\n${VOICE_REF}\n\n${SEC_PROMPTS[section]}${suppBlock}\n\nARTICLES TO ANALYZE:\n\n${articlesText}`;
}

// ─── API ─────────────────────────────────────────────────────────────────────

async function ai(prompt, maxTok=1500) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.antKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

async function fetchNews(kw) {
  // Truncate to 4 words — EventRegistry does AND on all terms, longer queries return nothing
  const words = kw.trim().split(/[\s,]+/).filter(w => w.length > 2);
  const short = words.slice(0, 4).join(' ');
  const p = new URLSearchParams({q:short, lang:'eng', articlesCount:'5', articlesSortBy:'date', includeArticleBody:'true', articleBodyHtml:'false', skipDuplicates:'true'});
  const r = await fetch(`/.netlify/functions/news?${p}`);
  if (!r.ok) throw new Error('NewsAPI '+r.status);
  return (await r.json()).articles?.results || [];
  // No fallback — zero results means keywords need work. Source preview lets editor add a URL.
}

async function fetchUrl(url) {
  try {
    const r = await fetch(url, {mode:'cors'});
    if (!r.ok) return {url, body:''};
    const html = await r.text();
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return {url, body:(tmp.innerText||tmp.textContent||'').replace(/\s+/g,' ').slice(0,2000)};
  } catch { return {url, body:''}; }
}

function parseJSON(raw) {
  let c = raw.trim().replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
  const i = c.indexOf('['); if (i>0) c = c.slice(i);
  return JSON.parse(c);
}

function mdToHtml(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\(\[([^\]]+)\]\(([^)]+)\)\)/g,'(<a href="$2" target="_blank" rel="noopener">$1</a>)')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

async function scanHeadlines(mode) {
  upd({stage:'scanning', error:'', statusMsg: mode==='scan-broad'?'Fetching top global sources…':'Fetching NTK source pool…'});
  try {
    const r = await fetch(`/.netlify/functions/news?mode=${mode}`);
    if (!r.ok) throw new Error('Fetch failed '+r.status);
    const data = await r.json();
    const articles = data.articles?.results || [];
    if (!articles.length) throw new Error('No articles returned — check Netlify function logs');
    const headlines = articles.map((a,i) =>
      `${i+1}. [${a.source?.title||'Unknown'} | ${a.date||'?'}] ${a.title}`
    ).join('\n');
    upd({statusMsg:'Applying Story Selection Brief…'});
    const raw = await ai(DISC_WITH_HEADLINES(headlines), 2500);
    const candidates = parseJSON(raw);
    upd({candidates, storyOrder:candidates.map(c=>c.id), selected:new Set(), stage:'certify'});
  } catch(e) { upd({error:'Scan failed: '+e.message, stage:'init'}); }
}

async function discover() { await scanHeadlines('scan-ntk'); }
async function discoverBroad() { await scanHeadlines('scan-broad'); }

async function injectStory(cat) {
  if (S.injBusy) return;
  upd({injBusy:true, injStatus:'Finding '+cat+' stories…'});
  try {
    const raw = await ai(INJ_PROMPT(cat), 800);
    const data = parseJSON(raw);
    const ts = Date.now();
    const tagged = data.map((c,i)=>({...c,id:'inj-'+ts+'-'+i,injected:true,category:cat}));
    upd({candidates:[...S.candidates,...tagged], storyOrder:[...S.storyOrder,...tagged.map(c=>c.id)], injBusy:false, injStatus:tagged.length+' '+(tagged.length===1?'story':'stories')+' added'});
  } catch(e) { upd({injBusy:false, injStatus:'Failed: '+e.message}); }
}

async function importUrl(mode, storyId) {
  const url = S.urlInput.trim();
  if (!url) return;
  upd({urlInput:'', injStatus:'Fetching '+url+'…'});
  if (mode === 'lineup') {
    const result = await fetchUrl(url);
    const prompt = `Today is ${TODAY}. A URL has been imported: ${url}\nContent: ${(result.body||'').slice(0,600)}\nCreate 1 NTK candidate story from this URL. Civilian anchor required.\nReturn ONLY a JSON array. [{"id":"url-1","topic":"...","angle":"...","category":"Domestic","keywords":"specific named actors","sourcing":"moderate"}]`;
    try {
      const raw = await ai(prompt, 600);
      const data = parseJSON(raw);
      const tagged = data.map(c=>({...c,id:'url-'+Date.now(),injected:true,sourceUrl:url}));
      upd({candidates:[...S.candidates,...tagged], storyOrder:[...S.storyOrder,...tagged.map(c=>c.id)], injStatus:'Added to lineup'});
    } catch(e) { upd({injStatus:'Failed: '+e.message}); }
  } else if (mode==='story' && storyId) {
    const result = await fetchUrl(url);
    const existing = S.storyUrls[storyId] || [];
    upd({storyUrls:{...S.storyUrls,[storyId]:[...existing,result]}, injStatus:'URL attached to story'+(result.body?'':' (content unavailable)')});
  }
}

async function prefetchArticles() {
  upd({stage:'previewing', error:''});
  const picks = S.storyOrder.filter(id=>S.selected.has(id)).map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
  const fetched = {};
  for (const pick of picks) {
    upd({statusMsg:'Fetching sources: '+pick.topic+'…'});
    try {
      const arts = await fetchNews(pick.keywords);
      fetched[pick.id] = arts.map(a=>({
        title:a.title||'Untitled', url:a.url||'', date:a.date||'', source:a.source?.title||'Unknown',
        body:(a.body||'').slice(0,1400), included:true
      }));
    } catch(e) {
      fetched[pick.id] = [{title:'Fetch error: '+e.message, url:'', date:'', source:'Error', body:'', included:false}];
    }
  }
  upd({fetchedArticles:fetched, stage:'preview', statusMsg:''});
}

function toggleArticle(storyId, idx) {
  const arts = [...(S.fetchedArticles[storyId]||[])];
  arts[idx] = {...arts[idx], included:!arts[idx].included};
  upd({fetchedArticles:{...S.fetchedArticles,[storyId]:arts}});
}

async function addArticleUrl(storyId, url) {
  if (!url.trim()) return;
  const result = await fetchUrl(url.trim());
  const arts = [...(S.fetchedArticles[storyId]||[])];
  arts.push({title:url, url:url, date:'', source:'Editor import', body:result.body||'', included:true});
  upd({fetchedArticles:{...S.fetchedArticles,[storyId]:arts}});
}

async function generate() {
  upd({stage:'generating', error:''});
  const picks = S.storyOrder.filter(id=>S.selected.has(id)).map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
  const pkgs = {};
  const urlMap = {...S.candidateUrls};

  for (const pick of picks) {
    const fetchedArts = (S.fetchedArticles[pick.id]||[]).filter(a=>a.included);
    urlMap[pick.id] = fetchedArts.map(a=>({title:a.title,url:a.url}));

    let artsText = '';
    if (fetchedArts.length) {
      artsText = fetchedArts.map(a =>
        `TITLE: ${a.title}\nSOURCE: ${a.source}\nURL: ${a.url}\nDATE: ${a.date}\n\n${a.body}`
      ).join('\n\n---\n\n');
    } else {
      upd({statusMsg:'Fetching articles: '+pick.topic+'…'});
      try {
        const arts = await fetchNews(pick.keywords);
        urlMap[pick.id] = arts.slice(0,5).map(a=>({title:a.title,url:a.url}));
        artsText = arts.slice(0,4).map(a =>
          `TITLE: ${a.title}\nSOURCE: ${a.source?.title||'Unknown'}\nURL: ${a.url}\nDATE: ${a.date||''}\n\n${(a.body||'').slice(0,1400)}`
        ).join('\n\n---\n\n');
      } catch { artsText = '[Article fetch failed]'; }
    }

    const pkg = {};
    const todo = SECS.filter(s=>S.sections.has(s));
    const allSupp = [...(S.storyUrls[pick.id]||[])];

    for (const sec of todo) {
      upd({statusMsg:pick.topic+' · '+sec+'…'});
      try {
        pkg[sec] = await ai(makePrompt(sec, artsText, allSupp), 1500);
      } catch(e) { pkg[sec] = '[Generation failed: '+e.message+']'; }
    }
    pkgs[pick.id] = pkg;
  }
  upd({packages:pkgs, candidateUrls:urlMap, stage:'output', statusMsg:''});
}

function moveStory(id, dir) {
  const order = [...S.storyOrder];
  const idx = order.indexOf(id); const swap = idx+dir;
  if (swap<0||swap>=order.length) return;
  [order[idx],order[swap]] = [order[swap],order[idx]];
  upd({storyOrder:order});
}
function toggleSel(id) {
  const next = new Set(S.selected);
  if (next.has(id)) { next.delete(id); } else if (next.size<8) { next.add(id); }
  upd({selected:next});
}
function toggleSec(s) {
  const next = new Set(S.sections);
  if (next.has(s)) { next.delete(s); } else { next.add(s); }
  upd({sections:next});
}
function cp(text, key) {
  navigator.clipboard.writeText(text).catch(()=>{});
  upd({copied:key});
  setTimeout(()=>upd({copied:''}),2000);
}
function upd(p) {
  Object.assign(S,p);
  if (p.antKey!==undefined) localStorage.setItem('ntk_ant',S.antKey);
  draw();
}
function reset() { upd({stage:'init',error:'',candidates:[],storyOrder:[],selected:new Set(),packages:{},candidateUrls:{},fetchedArticles:{},storyUrls:{}}); }

      cp(t,id);

  }

  el('restart-btn').onclick = reset;

function bind(id,ev,fn){const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
