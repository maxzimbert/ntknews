<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTK · Production</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f2; --surface: #fff; --surface2: #f0ede8;
  --border: #d8d3cc; --border-hi: #a8a098;
  --text: #1a1712; --body: #2e2a25; --muted: #6b6560;
  --accent: #8b6410; --accent-hi: #a07818; --accent-bg: #fdf8ee;
  --green: #2e6e45; --green-bg: #eaf4ee;
  --amber: #7a5c0a; --amber-bg: #fdf5e0;
  --red: #8b2e1a; --red-bg: #fdf0ee;
  --mono: 'JetBrains Mono','Fira Mono','Courier New',monospace;
  --serif: 'Georgia','Times New Roman',serif;
}
body { background:var(--bg); color:var(--body); font-family:var(--mono); font-size:13px; line-height:1.65; min-height:100vh; }
#app { max-width:820px; margin:0 auto; padding:32px 24px 80px; }
.masthead { border-bottom:2px solid var(--accent); padding-bottom:12px; margin-bottom:32px; display:flex; justify-content:space-between; align-items:flex-end; }
.masthead-title { font-family:var(--serif); font-size:26px; color:var(--accent); }
.masthead-date { font-size:11px; color:var(--muted); margin-top:4px; }
.stage-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); margin-bottom:20px; }
label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:5px; font-weight:700; }
input[type=password], input[type=text], input[type=url] { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:13px; padding:9px 12px; outline:none; border-radius:2px; margin-bottom:12px; }
input:focus { border-color:var(--accent); }
.btn { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; padding:9px 18px; cursor:pointer; border:none; border-radius:2px; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hi); }
.btn-primary:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); font-family:var(--mono); font-size:11px; padding:7px 13px; cursor:pointer; border-radius:2px; }
.btn-ghost:hover { border-color:var(--border-hi); color:var(--body); }
.btn-ghost.on { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
.btn-sm { font-size:10px; padding:5px 10px; }
.spinner-wrap { text-align:center; padding:60px 0; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; margin:0 auto 16px; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.spinner-msg { font-size:12px; color:var(--muted); }
.story-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.story-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; }
.story-card.selected { border-color:var(--accent); }
.story-card.injected { border-left:3px solid var(--accent); }
.sc-header { display:flex; align-items:stretch; cursor:pointer; }
.sc-num { width:36px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--muted); background:var(--surface2); flex-shrink:0; border-right:1px solid var(--border); }
.story-card.selected .sc-num { color:var(--accent); background:var(--accent-bg); }
.sc-body { flex:1; padding:11px 13px; min-width:0; }
.sc-topic { font-family:var(--serif); font-size:15px; color:var(--text); font-weight:bold; margin-bottom:3px; }
.sc-angle { font-size:12px; color:var(--body); line-height:1.5; margin-bottom:7px; }
.sc-meta { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.tag { font-size:9px; padding:2px 6px; border-radius:2px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
.tag-s { background:var(--green-bg); color:var(--green); }
.tag-m { background:var(--amber-bg); color:var(--amber); }
.tag-x { background:var(--red-bg); color:var(--red); }
.tag-cat { font-size:9px; color:var(--accent); border:1px solid var(--accent); padding:2px 7px; border-radius:2px; cursor:pointer; background:var(--accent-bg); }
.sc-actions { display:flex; flex-direction:column; justify-content:center; gap:4px; padding:8px 6px; border-left:1px solid var(--border); }
.arr-btn { background:var(--surface2); border:1px solid var(--border); border-radius:2px; cursor:pointer; font-size:12px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--muted); }
.arr-btn:hover { border-color:var(--accent); color:var(--accent); }
.arr-btn:disabled { opacity:.3; cursor:default; }
.check-box { width:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-left:1px solid var(--border); color:var(--accent); font-size:16px; }
.injector { background:var(--surface2); border:1px solid var(--border); border-radius:3px; padding:14px 16px; margin:12px 0; }
.inj-title { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:10px; font-weight:700; }
.pick-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.pick-btn { font-family:var(--mono); font-size:10px; padding:5px 10px; border:1px solid var(--border); border-radius:2px; cursor:pointer; background:var(--surface); color:var(--body); }
.pick-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.pick-btn:disabled { opacity:.5; cursor:default; }
.inj-custom { display:flex; gap:8px; }
.inj-custom input { margin-bottom:0; flex:1; }
.inj-status { font-size:11px; color:var(--muted); margin-top:8px; min-height:16px; }
.url-import { background:var(--surface2); border:1px solid var(--border); border-radius:3px; padding:12px 14px; margin:12px 0; }
.ui-row { display:flex; gap:8px; }
.ui-row input { margin-bottom:0; flex:1; }
.sec-wrap { border-top:1px solid var(--border); padding-top:16px; margin-top:8px; }
.sec-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px; }
.ctrl-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.counter { font-size:12px; color:var(--muted); }
.counter strong { color:var(--accent); }
.src-story { background:var(--surface); border:1px solid var(--border); border-radius:3px; margin-bottom:12px; overflow:hidden; }
.src-story-hdr { background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
.src-story-topic { font-family:var(--serif); font-size:14px; color:var(--text); font-weight:bold; }
.src-article { display:flex; align-items:flex-start; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); }
.src-article:last-child { border-bottom:none; }
.src-article.excluded { opacity:.45; }
.src-art-meta { flex:1; min-width:0; }
.src-art-title a { font-size:12px; color:var(--accent); text-decoration:none; line-height:1.4; }
.src-art-title a:hover { text-decoration:underline; }
.src-art-info { font-size:10px; color:var(--muted); margin-top:3px; }
.src-toggle { background:none; border:1px solid var(--border); border-radius:2px; cursor:pointer; font-size:11px; padding:2px 7px; color:var(--muted); flex-shrink:0; font-family:var(--mono); }
.src-toggle.on { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.src-add-row { padding:10px 14px; display:flex; gap:8px; border-top:1px dashed var(--border); }
.src-add-row input { margin-bottom:0; flex:1; font-size:12px; padding:6px 10px; }
.out-story { margin-bottom:28px; border:1px solid var(--border); border-radius:3px; overflow:hidden; }
.out-story-hdr { background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.out-story-num { font-size:11px; color:var(--muted); font-weight:700; }
.out-story-topic { font-family:var(--serif); font-size:16px; color:var(--text); font-weight:bold; }
.out-story-cat { font-size:10px; color:var(--accent); border:1px solid var(--accent); padding:2px 8px; border-radius:2px; }
.out-story-body { padding:20px; }
.out-sec { margin-bottom:22px; }
.out-sec:last-child { margin-bottom:0; }
.out-sec-lbl { font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); font-weight:700; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.out-text { font-size:13px; line-height:1.9; color:var(--body); }
.out-text strong { color:var(--text); }
.out-text a { color:var(--accent); text-decoration:none; }
.out-text a:hover { text-decoration:underline; }
.act-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.src-links { padding:8px 16px 10px; border-top:1px solid var(--border); background:var(--surface2); display:flex; gap:10px; flex-wrap:wrap; }
.error { background:var(--red-bg); border:1px solid #e8a090; color:var(--red); padding:10px 13px; margin-top:12px; font-size:12px; border-radius:2px; }
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <div>
      <div class="masthead-title">NTK · Production</div>
      <div class="masthead-date" id="date-lbl"></div>
    </div>
    <button class="btn-ghost" id="restart-btn" style="display:none">← Restart</button>
  </div>
  <div id="stage"></div>
</div>
<script>
const TODAY = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('date-lbl').textContent = TODAY;
const SECS = ['truths','probabilities','possibilities','lies'];
const QUICK_PICKS = ['US News','World News','Economy','Health','Foreign Policy','Public Memory','Education','Climate'];

let S = {
  stage:'init', antKey:localStorage.getItem('ntk_ant')||'',
  candidates:[], storyOrder:[], selected:new Set(), sections:new Set(SECS),
  fetchedArticles:{}, storyUrls:{},
  packages:{}, candidateUrls:{},
  urlInput:'', customInput:'', injBusy:false, injStatus:'',
  statusMsg:'', error:'', copied:''
};

// ─── PROMPTS ─────────────────────────────────────────────────────────────────

const DISC_PROMPT = (articleList) => `Today is ${TODAY}. You are the NTK News story scanner.

Below are real articles published TODAY by NTK's source pool. Each entry includes the article's internal URI, title, source, date, and a snippet.

YOUR JOB: Apply the Story Selection Brief to select 10-12 candidate stories. For each candidate, map it to the specific article URIs from this list that support it. These URIs will be used directly to fetch full article bodies — no keyword search.

ARTICLE LIST:
${articleList}

SELECTION CRITERIA:
COVERAGE: Most consequential 3-5 things in last 24-48hrs? What would Jamie (busy parent, stopped following news) feel left out of? What affects her paycheck, kids, healthcare, safety? What story has a historical dimension that makes today click?
MIX: Too heavy? Geographic diversity? Story Jamie would text? Verifiable progress? Story leaving her better equipped?
QUALITY: Actually new, not noise? Angle gives something to say? Civilian anchor available?
TWO-PRONG: When consequential enough, select both the event AND the structural pattern as separate items.

URI MAPPING: For each candidate, list the URIs of articles from the list above that are relevant to it. Be specific — only include URIs where the article actually covers this story.

SOURCING: strong = 3+ articles mapped. moderate = 1-2 articles mapped. manual = no articles found in this list, editor must supply a URL.
Note: this label only reflects what showed up in this 40-article scan window, not the true breadth of pool coverage — a separate pass searches further before synthesis, so don't undersell a candidate just because few of its sources happened to land in this batch.

CONCEPT TARGETING: For each candidate, also supply conceptEntity — the single most distinctive named person, organization, or place at the center of the story, written exactly as it would appear as a Wikipedia article title (e.g. "Kash Patel", "Hillary Clinton" — not "FBI Director Kash Patel" or just "Clinton"). If a surname alone is ambiguous between multiple well-known figures, always include the full disambiguating name. Use "" if no single entity is clearly central. Also supply narrowKeyword — exactly ONE distinctive word (not a phrase) likely to appear verbatim in any article about this specific story (e.g. "UFC" — not "UFC plot" or "assassination attempt", since this is matched as an exact phrase and multi-word guesses usually don't match). Use "" if the entity alone is already specific enough, or if you can't confidently predict a word that would appear verbatim.

Return ONLY a valid JSON array. No markdown fences.
[{"id":"1","topic":"short topic name","angle":"one sharp NTK sentence","category":"Geopolitical|Domestic|Economic|Cultural|Health|Science|Under-Reported|Orienting","articleUris":["uri1","uri2"],"sourcing":"strong|moderate|manual","conceptEntity":"","narrowKeyword":""}]`;

const INJ_PROMPT = (cat) => `Today is ${TODAY}. Find the 1-2 best NTK-worthy stories right now in: "${cat}".
Standards: consequential, civilian anchor, gives Jamie something to feel oriented by.
Also supply conceptEntity (single most distinctive named person/org/place, written as it would appear as a Wikipedia title — disambiguate ambiguous surnames, e.g. "Hillary Clinton" not "Clinton" — or "" if none) and narrowKeyword (exactly ONE word likely to appear verbatim in coverage of this specific story — not a phrase — or "" if unsure) — used for a follow-up pool-wide coverage search.
Return ONLY a valid JSON array. No markdown fences.
[{"id":"inj-1","topic":"...","angle":"one sharp NTK sentence","category":"${cat}","articleUris":[],"sourcing":"moderate","conceptEntity":"","narrowKeyword":""}]`;

const GLOBAL = `You are the journalist-historian for NTK News, a nonprofit news-and-history app. Advanced degree, reads a lot of history, writes for readers who are tired and news-avoidant at a 3rd-8th grade social studies level. The expertise is yours. The vocabulary is theirs.

EDITORIAL PILLARS:
1. Authoritarian movements are persistently ineffective, corrupt, incompetent, bullying, and wasteful. Pattern, not exception.
2. Income inequality erodes trust. Immigration is a net economic positive. Insufficient childcare and eroding middle-class ladders are structural failures. America's greatness is its people, its capacity for renewal, its flexible founding documents.
3. Climate change undermines stability. Privacy, reproductive rights, freedom of movement are constitutional rights. The Constitution is under stress from all three directions.
4. America is defined by contradictions. Tension between freedom and community obligation is the operating system. Journalism makes truths more durable.

TONE: AP clarity — every sentence earns its place. Walter Lippmann depth — situate news in historical cycles. Jamie is a busy parent who stopped reading. Orient her, don't lecture. NTK voice: grounded, direct, like a steady colleague.

STRUCTURAL RULES: Weave all source articles into unified analysis — never summarize separately. Citations: ([Source Name](URL)) in sentence before closing period. **Bold** for headlines and subheads only. Every factual claim needs a source.

SOURCE WEIGHTING: Articles are primary. Historical parallels are seasoning — one sentence max. NTK has a SWIPE LEFT History layer — create curiosity gaps.

QUALITY FLOOR: Clarity (no sentence needs rereading), Interestingness (crackles with liveliness), Aesthetic pleasure (writing moves). All three required.

CROSS-SECTION RULES: Already happened → Truths only. Most likely next step → Probabilities only. Lower-probability scenario → Possibilities only. Identifiable actor making unsupported claim → Lies only.

HARD OUTPUT LIMIT: 350 words per section. Mandatory ceiling. If source articles don't support an item, write [INSUFFICIENT SOURCE MATERIAL] — do not invent.`;

const VOICE_REF = `
VOICE — STUDY THESE EXAMPLES:
HEADLINE: "Norway Gave Every Five-Year-Old an iPad in 2016. A Decade Later, 500,000 Norwegians Can't Read a Text Message." Two sentences — scale, then consequence with a unit Jamie can feel.
BODY: Every number needs a unit. The kicker explains WHY, not just THAT.
DETAIL: "Researchers appended FAQs asking media not to use the words 'stupid,' 'dumb,' or 'brain rot' — a tell that the findings are exactly as bad as they sound." The meta-detail reveals more than the finding.
RULES: (1) Headline = fact + consequence with a unit. (2) Every number needs a unit. (3) One surgical quote from a named person only if it does something prose cannot. (4) Name the real mechanism beneath the stated one. (5) Second sentence adds consequence, not restatement. (6) End with weight.
JAMIE TEST: "Why should she care about this right now, in her actual life?" If not in the first two sentences, rewrite.`;

const SEC_PROMPTS = {
truths:`You are producing the TRUTHS section. HARD LIMIT: 350 words. Output only the Truths section.

Truths are observable facts — what people said and did. A historian's selection for vivid narrative.

REQUIRED OPENING:
- **Digest headline:** appears on the digest screen AND tops the story. Today's fact + civilian anchor (brand, dollar figure, named institution already in the reader's file folder). Two sentences. This is the most important line you write. Do NOT use years as anchors. No textbook chapter titles.
  Examples: "Trump's Tariffs Cost the Average American Family $1,700 a Year. That's a Car Payment." / "Childcare Costs More Than Rent in 28 States. The Middle Class Didn't Collapse — It Was Defunded."
- **Lede:** 1-2 sentences, 86-character hard limit, AP wire register.
- **Subhead:** one sentence bridging lede to items below.

THEN 2-4 ITEMS: **Bold item headline** + 2-4 sentence body (first lands the fact, second does something with it) + citation ([Source Name](URL)).
Boundary: predictions → Probabilities. speculation → Possibilities. debunking → Lies.`,

probabilities:`You are producing the PROBABILITIES section. HARD LIMIT: 350 words. Output only the Probabilities section.

Probabilities are likely next steps — pattern recognition stated with conviction. Not hedged speculation.

- Specific actors, timelines, mechanisms. State confidently: "will almost certainly," "the most likely outcome is."
- Each gives something to watch in the next 1-14 days.
- Do NOT command the reader to "watch" or "look." State what will happen and why.

FORMAT: Open with a **bold subhead** — lives inside the story, not on the digest screen. Orients reader within the section. Then each probability: **bold item headline** as own paragraph + body as separate paragraph. Most immediate to most structural.`,

possibilities:`You are producing the POSSIBILITIES section. HARD LIMIT: 350 words. Output only the Possibilities section.

Possibilities are lower-probability but plausible — black swans, second-order effects. Not the base case. Not fiction.

- Name conditions that make unlikely things likely: "If X and Y converge — then Z becomes plausible."
- At least one hopeful or constructive possibility.
- Every possibility tethered to evidence from the articles.

FORMAT: Open with a **bold subhead**. Then each possibility: **bold item headline** + 2-4 sentence body. Most grounded to most speculative. Register: informed curiosity — "here's the thing almost nobody is considering."`,

lies:`You are producing the LIES section. HARD LIMIT: 350 words. Output only the Lies section.

Lies are false or manipulative narratives in active circulation by identifiable actors. Not honest disagreements — deliberate distortion.

- Name the claim and who makes it. "Some people say" is not NTK's voice.
- Expose who benefits: clout, cash, or power. Formula: "For [group], this feels true. But historically, it functions as a lie."
- Do not dehumanize believers. The lie is the target.

FORMAT: Open with a **bold subhead**. Then each lie: **bold item headline** (distortion stated clearly) + 3-5 sentences: claim, maker, beneficiary, factual reality, historical parallel when earned. Most dangerous to most absurd. Register: controlled precision — a prosecutor, not a pundit.`
};

function makePrompt(section, articlesText, suppUrls) {
  const suppBlock = suppUrls && suppUrls.length
    ? '\n\nEDITOR-IMPORTED SOURCES:\n' + suppUrls.map(u=>`URL: ${u.url}\n${u.body||'[unavailable]'}`).join('\n\n---\n\n')
    : '';
  return `${GLOBAL}\n\n${VOICE_REF}\n\n${SEC_PROMPTS[section]}${suppBlock}\n\nARTICLES TO ANALYZE:\n\n${articlesText}`;
}

// ─── API ─────────────────────────────────────────────────────────────────────

async function ai(prompt, maxTok=1500) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.antKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

async function netlifyFetch(params) {
  const p = new URLSearchParams(params);
  const r = await fetch(`/.netlify/functions/news?${p}`);
  if (!r.ok) throw new Error('Function error '+r.status);
  const data = await r.json();
  // resolve-concept returns a plain array (suggestConceptsFast); the
  // scan/fetch/concept-search modes return {articles:{results:[...]}}
  if (Array.isArray(data)) return data;
  return data.articles?.results || [];
}

async function fetchByUris(uris) {
  if (!uris.length) return [];
  return netlifyFetch({mode:'fetch-by-uri', uris:uris.join(',')});
}

async function fetchUrl(url) {
  try {
    const r = await fetch(url, {mode:'cors'});
    if (!r.ok) return {url, body:''};
    const html = await r.text();
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return {url, body:(tmp.innerText||tmp.textContent||'').replace(/\s+/g,' ').slice(0,2000)};
  } catch { return {url, body:''}; }
}

function parseJSON(raw) {
  let c = raw.trim().replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
  const i = c.indexOf('['); if (i>0) c = c.slice(i);
  return JSON.parse(c);
}

function mdToHtml(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\(\[([^\]]+)\]\(([^)]+)\)\)/g,'(<a href="$2" target="_blank" rel="noopener">$1</a>)')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

async function scanHeadlines(mode) {
  upd({stage:'scanning', error:'', statusMsg: mode==='scan-broad'?'Fetching top global sources…':'Fetching NTK source pool…'});
  try {
    const articles = await netlifyFetch({mode});
    if (!articles.length) throw new Error('No articles returned');

    // Build rich list for Claude: URI | source | date | title + snippet
    const articleList = articles.map((a,i) =>
      `[${a.uri}] ${a.source?.title||'Unknown'} | ${a.date||'?'}\n  ${a.title}\n  ${(a.body||'').slice(0,200).replace(/\n/g,' ')}`
    ).join('\n\n');

    upd({statusMsg:'Applying Story Selection Brief…'});
    const raw = await ai(DISC_PROMPT(articleList), 2500);
    const candidates = parseJSON(raw);

    // Store the scan articles in state so preview can use them directly
    const scanArticleMap = {};
    articles.forEach(a => { scanArticleMap[a.uri] = a; });

    upd({candidates, storyOrder:candidates.map(c=>c.id), selected:new Set(), scanArticles:scanArticleMap, stage:'certify'});
  } catch(e) { upd({error:'Scan failed: '+e.message, stage:'init'}); }
}

async function discover() { await scanHeadlines('scan-ntk'); }
async function discoverBroad() { await scanHeadlines('scan-broad'); }

async function injectStory(cat) {
  if (S.injBusy) return;
  upd({injBusy:true, injStatus:'Finding '+cat+' stories…'});
  try {
    const raw = await ai(INJ_PROMPT(cat), 800);
    const data = parseJSON(raw);
    const ts = Date.now();
    const tagged = data.map((c,i)=>({...c,id:'inj-'+ts+'-'+i,injected:true,category:cat}));
    upd({candidates:[...S.candidates,...tagged], storyOrder:[...S.storyOrder,...tagged.map(c=>c.id)], injBusy:false, injStatus:tagged.length+' '+(tagged.length===1?'story':'stories')+' added'});
  } catch(e) { upd({injBusy:false, injStatus:'Failed: '+e.message}); }
}

async function importUrl(mode, storyId) {
  const url = S.urlInput.trim();
  if (!url) return;
  upd({urlInput:'', injStatus:'Fetching '+url+'…'});
  if (mode==='lineup') {
    const result = await fetchUrl(url);
    const prompt = `Today is ${TODAY}. URL imported: ${url}\nContent: ${(result.body||'').slice(0,600)}\nCreate 1 NTK candidate. Civilian anchor required.\nAlso supply conceptEntity (single most distinctive named person/org/place, written as a Wikipedia title would be — disambiguate ambiguous surnames — or "" if none) and narrowKeyword (exactly ONE word likely to appear verbatim in coverage of this story, not a phrase, or "").\nReturn ONLY JSON array. [{"id":"url-1","topic":"...","angle":"...","category":"Domestic","articleUris":[],"sourcing":"moderate","conceptEntity":"","narrowKeyword":""}]`;
    try {
      const raw = await ai(prompt, 600);
      const data = parseJSON(raw);
      const tagged = data.map(c=>({...c,id:'url-'+Date.now(),injected:true,sourceUrl:url}));
      upd({candidates:[...S.candidates,...tagged], storyOrder:[...S.storyOrder,...tagged.map(c=>c.id)], injStatus:'Added to lineup'});
    } catch(e) { upd({injStatus:'Failed: '+e.message}); }
  } else if (mode==='story' && storyId) {
    const result = await fetchUrl(url);
    const existing = S.storyUrls[storyId]||[];
    upd({storyUrls:{...S.storyUrls,[storyId]:[...existing,result]}, injStatus:'URL attached to story'+(result.body?'':' (unavailable)')});
  }
}

async function gatherCoverage(pick) {
  if (!pick.conceptEntity) return [];
  try {
    const matches = await netlifyFetch({mode:'resolve-concept', q: pick.conceptEntity});
    const conceptUri = matches?.[0]?.uri;
    if (!conceptUri) return [];
    if (pick.narrowKeyword) {
      const narrowed = await netlifyFetch({mode:'scan-by-concept', conceptUri, pool:'ntk', articlesCount:'15', keyword:pick.narrowKeyword});
      if (narrowed.length) return narrowed;
      // Keyword matches as an exact phrase — a guessed word that doesn't
      // appear verbatim anywhere returns zero, not a smaller list. Fall back
      // to the concept alone rather than treating that as "no coverage."
    }
    return await netlifyFetch({mode:'scan-by-concept', conceptUri, pool:'ntk', articlesCount:'15'});
  } catch { return []; }
}

async function prefetchArticles() {
  upd({stage:'previewing', error:''});
  const picks = S.storyOrder.filter(id=>S.selected.has(id)).map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
  const fetched = {};

  for (const pick of picks) {
    upd({statusMsg:'Loading sources: '+pick.topic+'…'});
    const uris = pick.articleUris || [];
    let arts = [];

    if (uris.length) {
      // Fetch full bodies for the exact URIs Claude mapped during scan
      try {
        const known = await fetchByUris(uris);
        arts = known.map(a=>({
          title:a.title||'Untitled', url:a.url||'', uri:a.uri||'',
          date:a.date||'', source:a.source?.title||'Unknown',
          body:(a.body||'').slice(0,1400), included:true
        }));
      } catch(e) {
        arts = [{title:'Fetch error: '+e.message, url:'', date:'', source:'Error', body:'', included:false}];
      }
    }
    // else: manual sourcing — no URIs mapped from the scan window, leave arts
    // empty for now; coverage gathering below may still find something.

    // Pool-wide coverage gathering: the original scan only sees the 40 most
    // recent articles across the entire pool, so multi-outlet pickups of one
    // story often get crowded out by unrelated news before they're visible.
    // This searches the full pool specifically for this story and adds
    // anything new, deduped against what the scan already found.
    upd({statusMsg:'Checking full pool coverage: '+pick.topic+'…'});
    try {
      const extra = await gatherCoverage(pick);
      const known = new Set(arts.map(a=>a.uri).filter(Boolean));
      const added = extra
        .filter(a=>a.uri && !known.has(a.uri))
        .map(a=>({
          title:a.title||'Untitled', url:a.url||'', uri:a.uri||'',
          date:a.date||'', source:a.source?.title||'Unknown',
          body:(a.body||'').slice(0,1400), included:true
        }));
      arts = [...arts, ...added];
    } catch(e) { /* non-fatal — keep whatever the scan already found */ }

    fetched[pick.id] = arts;
  }
  upd({fetchedArticles:fetched, stage:'preview', statusMsg:''});
}

function toggleArticle(storyId, idx) {
  const arts = [...(S.fetchedArticles[storyId]||[])];
  arts[idx] = {...arts[idx], included:!arts[idx].included};
  upd({fetchedArticles:{...S.fetchedArticles,[storyId]:arts}});
}

async function addArticleUrl(storyId, url) {
  if (!url.trim()) return;
  const result = await fetchUrl(url.trim());
  const arts = [...(S.fetchedArticles[storyId]||[])];
  arts.push({title:result.body?url:'URL (content unavailable)', url:url.trim(), date:TODAY, source:'Editor import', body:result.body||'', included:true});
  upd({fetchedArticles:{...S.fetchedArticles,[storyId]:arts}});
}

async function generate() {
  upd({stage:'generating', error:''});
  const picks = S.storyOrder.filter(id=>S.selected.has(id)).map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
  const pkgs = {};
  const urlMap = {...S.candidateUrls};

  for (const pick of picks) {
    const fetchedArts = (S.fetchedArticles[pick.id]||[]).filter(a=>a.included);
    urlMap[pick.id] = fetchedArts.map(a=>({title:a.title, url:a.url}));

    const allSupp = [...(S.storyUrls[pick.id]||[])];
    const artsText = fetchedArts.length
      ? fetchedArts.map(a=>`TITLE: ${a.title}\nSOURCE: ${a.source}\nURL: ${a.url}\nDATE: ${a.date}\n\n${a.body}`).join('\n\n---\n\n')
      : '[No source articles — only imported URLs available]';

    const pkg = {};
    for (const sec of SECS.filter(s=>S.sections.has(s))) {
      upd({statusMsg:pick.topic+' · '+sec+'…'});
      try { pkg[sec] = await ai(makePrompt(sec, artsText, allSupp), 1500); }
      catch(e) { pkg[sec] = '[Generation failed: '+e.message+']'; }
    }
    pkgs[pick.id] = pkg;
  }
  upd({packages:pkgs, candidateUrls:urlMap, stage:'output', statusMsg:''});
}

function moveStory(id, dir) {
  const order=[...S.storyOrder], idx=order.indexOf(id), swap=idx+dir;
  if (swap<0||swap>=order.length) return;
  [order[idx],order[swap]]=[order[swap],order[idx]];
  upd({storyOrder:order});
}
function toggleSel(id) {
  const next=new Set(S.selected);
  if (next.has(id)) { next.delete(id); } else if (next.size<8) { next.add(id); }
  upd({selected:next});
}
function toggleSec(s) {
  const next=new Set(S.sections);
  if (next.has(s)) { next.delete(s); } else { next.add(s); }
  upd({sections:next});
}
function cp(text, key) {
  navigator.clipboard.writeText(text).catch(()=>{});
  upd({copied:key});
  setTimeout(()=>upd({copied:''}),2000);
}
function upd(p) {
  Object.assign(S,p);
  if (p.antKey!==undefined) localStorage.setItem('ntk_ant',S.antKey);
  draw();
}
function reset() { upd({stage:'init',error:'',candidates:[],storyOrder:[],selected:new Set(),packages:{},candidateUrls:{},fetchedArticles:{},storyUrls:{},scanArticles:{}}); }

// ─── RENDER ──────────────────────────────────────────────────────────────────

function draw() {
  const el=id=>document.getElementById(id);
  el('restart-btn').style.display=(S.stage!=='init'&&S.stage!=='scanning'&&S.stage!=='previewing')?'':'none';
  const c=el('stage');

  if (S.stage==='init') {
    c.innerHTML=`<div class="stage-lbl">01 · Keys</div>
      <label>Anthropic API Key</label><input type="password" id="ak" value="${x(S.antKey)}" placeholder="sk-ant-…" autocomplete="off">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
        <button class="btn btn-primary" id="scan-btn" ${!S.antKey?'disabled':''}>Scan NTK Sources →</button>
        <button class="btn-ghost" id="scan-broad-btn" ${!S.antKey?'disabled':''}>Broad Scan →</button>
      </div>
      <div style="font-size:10px;color:var(--muted);">NTK Scan: your 91-source pool · Broad Scan: top-tier global publishers by credibility rank</div>
      ${S.error?`<div class="error">${x(S.error)}</div>`:''}`;
    bind('ak','input',e=>upd({antKey:e.target.value}));
    bind('scan-btn','click',()=>{if(S.antKey)discover();});
    bind('scan-broad-btn','click',()=>{if(S.antKey)discoverBroad();});

  } else if (S.stage==='scanning') {
    c.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-msg">${x(S.statusMsg)||'Scanning…'}</div></div>`;

  } else if (S.stage==='certify') {
    const orderedCands=S.storyOrder.map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
    const cards=orderedCands.map((cand,idx)=>{
      const isSel=S.selected.has(cand.id), isDim=!isSel&&S.selected.size>=8;
      const tagCls=cand.sourcing==='strong'?'tag-s':cand.sourcing==='moderate'?'tag-m':'tag-x';
      const artCount=(cand.articleUris||[]).length;
      return `<div class="story-card${isSel?' selected':''}${cand.injected?' injected':''}" style="${isDim?'opacity:.38;pointer-events:none':''}">
        <div class="sc-header" data-toggle="${cand.id}">
          <div class="sc-num">${idx+1}</div>
          <div class="sc-body">
            <div class="sc-topic">${x(cand.topic)}</div>
            <div class="sc-angle">${x(cand.angle)}</div>
            <div class="sc-meta">
              <span class="tag ${tagCls}">${x(cand.sourcing)}</span>
              <span style="font-size:10px;color:var(--muted);">${artCount} article${artCount!==1?'s':''} mapped</span>
              <span class="tag-cat" data-cat="${cand.id}">${x(cand.category)} ✎</span>
              ${cand.conceptEntity?`<span style="font-size:10px;color:var(--muted);">🔎 ${x(cand.conceptEntity)}${cand.narrowKeyword?' · '+x(cand.narrowKeyword):''}</span>`:''}
              ${cand.injected?'<span style="font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;">+ added</span>':''}
              <a href="https://news.google.com/search?q=${encodeURIComponent(cand.topic)}" target="_blank" rel="noopener" style="font-size:10px;color:var(--accent);text-decoration:none;" onclick="event.stopPropagation()">search →</a>
            </div>
          </div>
          <div class="sc-actions">
            <button class="arr-btn" data-up="${cand.id}" ${idx===0?'disabled':''}>↑</button>
            <button class="arr-btn" data-dn="${cand.id}" ${idx===orderedCands.length-1?'disabled':''}>↓</button>
          </div>
          ${isSel?'<div class="check-box">✓</div>':'<div style="width:36px;border-left:1px solid var(--border)"></div>'}
        </div>
      </div>`;
    }).join('');

    const quickBtns=QUICK_PICKS.map(p=>`<button class="pick-btn" data-pick="${x(p)}" ${S.injBusy?'disabled':''}>${x(p)}</button>`).join('');
    const secBtns=SECS.map(s=>`<button class="btn-ghost btn-sm${S.sections.has(s)?' on':''}" data-sec="${s}">${s}</button>`).join('');

    c.innerHTML=`<div class="stage-lbl">02 · Certify the Mix</div>
      <div class="ctrl-row">
        <div class="counter"><strong>${S.selected.size}</strong> / 8 selected</div>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost btn-sm" id="rescan-btn">↺ NTK</button>
          <button class="btn-ghost btn-sm" id="rescan-broad-btn">↺ Broad</button>
        </div>
      </div>
      <div class="story-list">${cards}</div>
      <div class="injector">
        <div class="inj-title">Add a story to the lineup</div>
        <div class="pick-row">${quickBtns}</div>
        <div class="inj-custom">
          <input type="text" id="cust-in" value="${x(S.customInput)}" placeholder="Custom topic…">
          <button class="btn btn-primary btn-sm" id="cust-btn" ${S.injBusy?'disabled':''}>Find Story →</button>
        </div>
        <div class="inj-status">${x(S.injStatus)}</div>
      </div>
      <div class="url-import">
        <label style="margin-bottom:8px;">Import a URL</label>
        <div class="ui-row"><input type="url" id="url-in" value="${x(S.urlInput)}" placeholder="https://…"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
          <button class="btn btn-primary btn-sm" id="url-lineup-btn">+ Add to Lineup</button>
          <select id="url-story-sel" style="font-family:var(--mono);font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:2px;background:var(--surface);color:var(--body);flex:1;">
            <option value="">Enhance a story…</option>
            ${orderedCands.map(c=>`<option value="${x(c.id)}">${x(c.topic)}</option>`).join('')}
          </select>
          <button class="btn-ghost btn-sm" id="url-story-btn">Attach →</button>
        </div>
        <div class="inj-status" style="margin-top:6px;">${x(S.injStatus)}</div>
      </div>
      <div class="sec-wrap">
        <label style="margin-bottom:8px;">Sections to generate</label>
        <div class="sec-row">${secBtns}</div>
        <button class="btn btn-primary" id="gen-btn" ${S.selected.size===0||S.sections.size===0?'disabled':''}>Preview Sources →</button>
      </div>
      ${S.error?`<div class="error">${x(S.error)}</div>`:''}`;

    c.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',e=>{
      if(e.target.dataset.cat||e.target.dataset.up||e.target.dataset.dn||e.target.tagName==='A') return;
      toggleSel(el.dataset.toggle);
    }));
    c.querySelectorAll('[data-up]').forEach(b=>b.addEventListener('click',()=>moveStory(b.dataset.up,-1)));
    c.querySelectorAll('[data-dn]').forEach(b=>b.addEventListener('click',()=>moveStory(b.dataset.dn,1)));
    c.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',e=>{
      e.stopPropagation();
      const id=b.dataset.cat, cand=S.candidates.find(c=>c.id===id);
      const newCat=prompt(`Category for "${cand.topic}":`,cand.category);
      if(newCat&&newCat.trim()) upd({candidates:S.candidates.map(c=>c.id===id?{...c,category:newCat.trim()}:c)});
    }));
    c.querySelectorAll('[data-sec]').forEach(b=>b.addEventListener('click',()=>toggleSec(b.dataset.sec)));
    c.querySelectorAll('[data-pick]').forEach(b=>b.addEventListener('click',()=>injectStory(b.dataset.pick)));
    bind('rescan-btn','click',discover);
    bind('rescan-broad-btn','click',discoverBroad);
    bind('gen-btn','click',()=>{if(S.selected.size&&S.sections.size)prefetchArticles();});
    bind('cust-in','input',e=>{S.customInput=e.target.value;});
    bind('cust-in','keydown',e=>{if(e.key==='Enter'&&S.customInput.trim())injectStory(S.customInput.trim());});
    bind('cust-btn','click',()=>{if(S.customInput.trim())injectStory(S.customInput.trim());});
    bind('url-in','input',e=>upd({urlInput:e.target.value}));
    bind('url-lineup-btn','click',()=>importUrl('lineup'));
    bind('url-story-btn','click',()=>{
      const sel=document.getElementById('url-story-sel');
      if(sel&&sel.value) importUrl('story',sel.value);
      else upd({injStatus:'Select a story from the dropdown first'});
    });

  } else if (S.stage==='previewing') {
    c.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-msg">${x(S.statusMsg)||'Loading sources…'}</div></div>`;

  } else if (S.stage==='preview') {
    const picks=S.storyOrder.filter(id=>S.selected.has(id)).map(id=>S.candidates.find(c=>c.id===id)).filter(Boolean);
    const storyBlocks=picks.map(pick=>{
      const arts=S.fetchedArticles[pick.id]||[];
      const artItems=arts.map((a,idx)=>`
        <div class="src-article${a.included?'':' excluded'}">
          <div class="src-art-meta">
            <div class="src-art-title"><a href="${x(a.url)}" target="_blank" rel="noopener">${x(a.title)}</a></div>
            <div class="src-art-info">${x(a.source)} · <strong style="color:var(--accent)">${x(a.date)}</strong></div>
          </div>
          <button class="src-toggle${a.included?' on':''}" data-story="${pick.id}" data-idx="${idx}">${a.included?'✓ in':'○ out'}</button>
        </div>`).join('');
      const noArts=!arts.length?`<div style="padding:10px 14px;font-size:11px;color:var(--muted);">No articles mapped — add a URL below to source this story.</div>`:'';
      return `<div class="src-story">
        <div class="src-story-hdr">
          <div class="src-story-topic">${x(pick.topic)}</div>
          <div style="font-size:10px;color:var(--muted);">${arts.filter(a=>a.included).length}/${arts.length} in synthesis</div>
        </div>
        ${artItems}${noArts}
        <div class="src-add-row">
          <input type="url" placeholder="Add a URL to this story…" id="add-url-${x(pick.id)}">
          <button class="btn-ghost btn-sm" data-addurl="${pick.id}">Add →</button>
        </div>
      </div>`;
    }).join('');

    c.innerHTML=`<div class="stage-lbl">03 · Review Sources</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Articles from the scan plus a full pool-wide search per story. Toggle any out. Add a URL for anything missing.</div>
      ${storyBlocks}
      <div class="act-row" style="margin-top:20px;">
        <button class="btn btn-primary" id="run-gen-btn">Run Synthesis →</button>
        <button class="btn-ghost" id="back-to-certify">← Back</button>
      </div>
      ${S.error?`<div class="error">${x(S.error)}</div>`:''}`;

    c.querySelectorAll('[data-story]').forEach(b=>b.addEventListener('click',()=>toggleArticle(b.dataset.story,+b.dataset.idx)));
    c.querySelectorAll('[data-addurl]').forEach(b=>b.addEventListener('click',()=>{
      const inp=document.getElementById('add-url-'+b.dataset.addurl);
      if(inp&&inp.value.trim()) addArticleUrl(b.dataset.addurl,inp.value.trim());
    }));
    bind('run-gen-btn','click',generate);
    bind('back-to-certify','click',()=>upd({stage:'certify'}));

  } else if (S.stage==='generating') {
    c.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-msg">${x(S.statusMsg)}</div></div>`;

  } else if (S.stage==='output') {
    const orderedPicks=S.storyOrder.filter(id=>S.selected.has(id)&&S.packages[id]);
    const allText=orderedPicks.map((id,i)=>{
      const cand=S.candidates.find(c=>c.id===id), pkg=S.packages[id];
      return `--- Story ${i+1}: ${cand?.topic||id} ---\n\n`+SECS.filter(s=>S.sections.has(s)).map(s=>`[${s.toUpperCase()}]\n${pkg[s]||''}`).join('\n\n');
    }).join('\n\n════════════════════════════\n\n');

    const storyBlocks=orderedPicks.map((id,i)=>{
      const cand=S.candidates.find(c=>c.id===id), pkg=S.packages[id];
      const srcUrls=S.candidateUrls[id]||[];
      const secBlocks=SECS.filter(s=>S.sections.has(s)).map(s=>`
        <div class="out-sec">
          <div class="out-sec-lbl">${s}</div>
          <div class="out-text">${mdToHtml(pkg[s]||'').replace(/\n/g,'<br>')}</div>
        </div>`).join('');
      const srcLinks=srcUrls.length
        ?`<div class="src-links">${srcUrls.map(s=>`<a href="${x(s.url)}" target="_blank" rel="noopener" style="font-size:10px;color:var(--accent);text-decoration:none;" title="${x(s.title)}">↗ ${x((s.title||s.url).slice(0,50)+(s.title&&s.title.length>50?'…':''))}</a>`).join('')}</div>`
        :'';
      const storyText=SECS.filter(s=>S.sections.has(s)).map(s=>`[${s.toUpperCase()}]\n${pkg[s]||''}`).join('\n\n');
      return `<div class="out-story">
        <div class="out-story-hdr">
          <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
            <div class="out-story-num">${i+1}</div>
            <div class="out-story-topic">${x(cand?.topic||id)}</div>
            <div class="out-story-cat">${x(cand?.category||'')}</div>
          </div>
          <button class="btn-ghost btn-sm" data-cpstory="${id}">${S.copied===id?'Copied ✓':'Copy story'}</button>
        </div>
        ${srcLinks}
        <div class="out-story-body">${secBlocks}</div>
      </div>`;
    }).join('');

    c.innerHTML=`<div class="stage-lbl">04 · Output</div>
      <div class="act-row">
        <button class="btn btn-primary" id="cp-all">${S.copied==='all'?'Copied ✓':'Copy all stories'}</button>
        <button class="btn-ghost" id="back-btn">← Back to sources</button>
      </div>
      ${storyBlocks}
      ${S.error?`<div class="error">${x(S.error)}</div>`:''}`;

    bind('cp-all','click',()=>cp(allText,'all'));
    bind('back-btn','click',()=>upd({stage:'preview'}));
    c.querySelectorAll('[data-cpstory]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.cpstory,cand=S.candidates.find(c=>c.id===id),pkg=S.packages[id];
      cp(`Story: ${cand?.topic||id}\n\n`+SECS.filter(s=>S.sections.has(s)).map(s=>`[${s.toUpperCase()}]\n${pkg[s]||''}`).join('\n\n'),id);
    }));
  }

  el('restart-btn').onclick=reset;
}

function bind(id,ev,fn){const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('restart-btn').addEventListener('click',reset);
draw();
</script>
</body>
